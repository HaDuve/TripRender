      (function initWaypointSuggestions() {
        const SUGGEST_DEBOUNCE_MS = 250;
        const MIN_QUERY_LENGTH = 2;
        const SUGGEST_LIMIT = 5;

        const dropdown = document.getElementById("waypoint-suggestions");
        let suggestTimeout = null;
        let activeSuggestInput = null;

        function isInputValid(el) {
          return el && document.contains(el);
        }

        function hideSuggestions() {
          if (suggestTimeout) {
            clearTimeout(suggestTimeout);
            suggestTimeout = null;
          }
          dropdown.classList.remove("visible");
          dropdown.setAttribute("aria-hidden", "true");
          dropdown.innerHTML = "";
          activeSuggestInput = null;
        }

        function positionDropdownUnderInput(inputEl) {
          const rect = inputEl.getBoundingClientRect();
          const panelEl = document.getElementById("input");
          const panelRect = panelEl
            ? panelEl.getBoundingClientRect()
            : { top: 0, left: 0 };
          dropdown.style.top = rect.bottom - panelRect.top + "px";
          dropdown.style.left = rect.left - panelRect.left + "px";
          dropdown.style.width = Math.max(rect.width, 260) + "px";
        }

        function showSuggestions(inputEl, features) {
          if (!inputEl || !features.length) {
            hideSuggestions();
            return;
          }
          if (!isInputValid(inputEl)) {
            hideSuggestions();
            return;
          }
          activeSuggestInput = inputEl;
          positionDropdownUnderInput(inputEl);
          dropdown.innerHTML = "";
          features.forEach((f) => {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "waypoint-suggestion-item";
            btn.textContent = f.place_name;
            btn.setAttribute("data-place-name", f.place_name);
            dropdown.appendChild(btn);
          });
          dropdown.classList.add("visible");
          dropdown.setAttribute("aria-hidden", "false");
        }

        function fetchSuggestions(query) {
          const url =
            "https://api.mapbox.com/geocoding/v5/mapbox.places/" +
            encodeURIComponent(query) +
            ".json?access_token=" +
            mapboxgl.accessToken +
            "&limit=" +
            SUGGEST_LIMIT;
          return fetch(url).then((r) => r.json());
        }

        function runSuggest(inputEl) {
          const q = inputEl.value.trim();
          if (q.length < MIN_QUERY_LENGTH) {
            hideSuggestions();
            return;
          }
          fetchSuggestions(q)
            .then((data) => {
              const features = data.features || [];
              if (!isInputValid(activeSuggestInput)) {
                activeSuggestInput = null;
                hideSuggestions();
                return;
              }
              if (activeSuggestInput === inputEl) {
                showSuggestions(inputEl, features);
              }
            })
            .catch(() => {
              if (!isInputValid(activeSuggestInput)) {
                activeSuggestInput = null;
                hideSuggestions();
                return;
              }
              if (activeSuggestInput === inputEl) hideSuggestions();
            });
        }

        document
          .getElementById("waypoints")
          .addEventListener("focusin", (e) => {
            const input = e.target.closest
              ? e.target.closest(".waypoint-row input")
              : null;
            if (input && input.type === "text") {
              activeSuggestInput = input;
            }
          });

        document
          .getElementById("waypoints")
          .addEventListener("focusout", (e) => {
            const input = e.target.closest
              ? e.target.closest(".waypoint-row input")
              : null;
            if (!input) return;
            setTimeout(() => {
              const activeEl = document.activeElement;
              const activeIsWaypoint =
                activeEl &&
                activeEl.closest &&
                activeEl.closest("#waypoints") &&
                activeEl.closest(".waypoint-row") &&
                activeEl.type === "text";
              if (
                activeEl !== input &&
                !dropdown.contains(activeEl) &&
                !activeIsWaypoint
              ) {
                hideSuggestions();
              }
            }, 150);
          });

        document.getElementById("waypoints").addEventListener("input", (e) => {
          const input = e.target.closest
            ? e.target.closest(".waypoint-row input")
            : null;
          if (!input || input.type !== "text") return;
          activeSuggestInput = input;
          if (suggestTimeout) clearTimeout(suggestTimeout);
          suggestTimeout = setTimeout(
            () => runSuggest(input),
            SUGGEST_DEBOUNCE_MS,
          );
        });

        document
          .getElementById("waypoints")
          .addEventListener("keydown", (e) => {
            const input = e.target.closest
              ? e.target.closest(".waypoint-row input")
              : null;
            if (!input) return;
            if (e.key === "Escape") {
              hideSuggestions();
              suggestTimeout && clearTimeout(suggestTimeout);
              suggestTimeout = null;
            }
          });

        document
          .getElementById("waypoints")
          .addEventListener("waypoint-row-removed", () => {
            if (suggestTimeout) {
              clearTimeout(suggestTimeout);
              suggestTimeout = null;
            }
            hideSuggestions();
          });

        dropdown.addEventListener("click", (e) => {
          const item = e.target.closest(".waypoint-suggestion-item");
          if (!item || !activeSuggestInput) return;
          if (!isInputValid(activeSuggestInput)) {
            activeSuggestInput = null;
            hideSuggestions();
            return;
          }
          const placeName = item.getAttribute("data-place-name");
          if (placeName) {
            activeSuggestInput.value = placeName;
            activeSuggestInput.focus();
          }
          hideSuggestions();
        });
      })();

      async function getRoute() {
        const errorEl = document.getElementById("error");
        errorEl.textContent = "";

        const wrap = document.getElementById("drawRouteWrap");
        const btn = document.getElementById("drawRouteBtn");

        const queries = Array.from(getWaypointInputs())
          .map((i) => i.value.trim())
          .filter(Boolean);
        if (queries.length < 2) {
          errorEl.textContent = "Enter at least 2 places.";
          return;
        }

        wrap?.classList.add("loading");
        btn.disabled = true;

        try {
          const geocode = (q) =>
            fetch(
              `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(q)}.json?access_token=${mapboxgl.accessToken}`,
            ).then(async (r) => {
              const json = await r.json();
              if (!r.ok)
                throw new Error(json.message || `Geocoding HTTP ${r.status}`);
              return json;
            });

          const results = await Promise.all(queries.map((q) => geocode(q)));

          const waypoints = results.map((r) => r.features?.[0]?.center);
          const firstMissing = waypoints.findIndex((w) => !w);
          if (firstMissing !== -1) {
            errorEl.textContent = `Could not find: "${queries[firstMissing]}"`;
            return;
          }

          const modes = getLegModes();
          const routeCoords = [];
          const legLengths = [];
          const legMercatorLengthsM = [];

          for (let i = 0; i < waypoints.length - 1; i++) {
            const a = waypoints[i];
            const b = waypoints[i + 1];
            const mode = modes[i] || "drive";

            let segment;
            if (mode === "fly") {
              segment = [a, b];
            } else {
              const profile = mode === "walk" ? "walking" : "driving";
              const coords = `${a[0]},${a[1]};${b[0]},${b[1]}`;
              const dirRes = await fetch(
                `https://api.mapbox.com/directions/v5/mapbox/${profile}/${coords}?geometries=geojson&access_token=${mapboxgl.accessToken}`,
              ).then((r) => r.json());

              if (!dirRes.routes?.length) {
                segment = [a, b];
                setLegMode(i, "fly");
              } else {
                segment = dirRes.routes[0].geometry.coordinates;
              }
            }

            legLengths.push(
              turf.length(turf.lineString(segment), { units: "kilometers" }),
            );
            legMercatorLengthsM.push(mercatorPolylineLengthMeters(segment));
            if (routeCoords.length > 0) {
              routeCoords.pop();
            }
            routeCoords.push(...segment);
          }

          const route = routeCoords;
          const totalMercatorM = legMercatorLengthsM.reduce((a, b) => a + b, 0);
          const legMercatorLengthsKm = legMercatorLengthsM.map((m) => m / 1000);
          // Cumulative Mercator length / total (matches Mapbox `line-progress`); legLengths stay in km for timing UI.
          const legEndProgress =
            totalMercatorM <= 0
              ? [1]
              : legMercatorLengthsM.map(
                  (_, i) =>
                    legMercatorLengthsM
                      .slice(0, i + 1)
                      .reduce((a, b) => a + b, 0) / totalMercatorM,
                );

          removeRouteLayerOnly();
          currentRoute = null;
          updateAnimationUI();

          addRouteLayerFromCoords(route);

          currentRoute = {
            type: "Feature",
            geometry: { type: "LineString", coordinates: route },
            properties: { legEndProgress, legLengths, legMercatorLengthsKm },
          };
          animationDirty = false;
          updateAnimationUI();
          setPanelOpen(false);

          const manualDurationsOn = document.getElementById(
            "editDurationsManually",
          )?.checked;
          if (!manualDurationsOn) {
            applyDerivedMaxTimeFromDuration();
          } else {
            syncDurationFromLegInputs();
          }
          applyAutoAltitude();

          const bounds = new mapboxgl.LngLatBounds();
          route.forEach((c) => bounds.extend(c));
          map.fitBounds(bounds, { padding: 50, pitch: 20, bearing: 0 });
        } catch (err) {
          errorEl.textContent =
            "Error: " + (err.message || "Something went wrong");
        } finally {
          wrap?.classList.remove("loading");
          btn.disabled = false;
        }
      }

      async function animateRoute() {
        if (!currentRoute) return;
        if (animationState === "playing") {
          animationControls.pauseRequested = true;
          animationState = "paused";
          updateAnimationUI();
          return;
        }
        if (animationState === "paused") {
          animationControls.pauseRequested = false;
          animationState = "playing";
          updateAnimationUI();
          return;
        }
        setPanelOpen(false);
        animationState = "playing";
        animationControls.stopRequested = false;
        animationControls.pauseRequested = false;
        updateAnimationUI();
        try {
          const legEndProgress = currentRoute?.properties?.legEndProgress ?? [
            1,
          ];
          const manualDurations = getManualLegDurationsForAnimation(
            legEndProgress.length,
          );
          await animatePath({
            map,
            path: currentRoute,
            maxTimePerStep:
              (Number(document.getElementById("maxTimePerStep").value) || 2) *
              1000,
            speedup: TRIPRENDER_SPEEDUP,
            manualLegDurations: manualDurations ?? undefined,
            startBearing: TRIPRENDER_DEFAULT_BEARING,
            startAltitude:
              Number(document.getElementById("startAltitude").value) || 400000,
            pitch: TRIPRENDER_DEFAULT_PITCH,
            lineGradient: document.getElementById("lineGradient").checked,
            cameraFollow: document.getElementById("cameraFollow").checked,
            bearingChange: document.getElementById("bearingChange").checked,
            controls: animationControls,
          });
        } finally {
          animationState = "idle";
          updateAnimationUI();
          setPanelOpen(true);
        }
      }

      function triprenderFormatBytes(n) {
        if (n == null || !Number.isFinite(n)) return "";
        if (n < 1024) return n + " B";
        if (n < 1024 * 1024)
          return (n / 1024).toFixed(n < 10240 ? 1 : 0) + " KB";
        return (n / (1024 * 1024)).toFixed(1) + " MB";
      }

      }

      function waitDoubleRaf() {
        return new Promise(function (resolve) {
          requestAnimationFrame(function () {
            requestAnimationFrame(resolve);
          });
        });
      }

      /**
       * Wait for tiles/GPU using repaint + rAF only. Do not use map.once("idle") here:
       * in Tauri/WebKit, "idle" often does not fire until the user pans/zooms, which blocks
       * export indefinitely and prevents status updates ("Loading encoder…", "Done…").
       */
      async function settleMapWithRepaint(map, paintCycles) {
        var n = paintCycles == null ? 28 : Math.max(4, Math.floor(paintCycles));
        var i;
        for (i = 0; i < n; i++) {
          map.triggerRepaint();
          await new Promise(function (r) {
            requestAnimationFrame(r);
          });
        }
        await waitDoubleRaf();
      }

      /** Extra pixels around export resolution; edges are cropped from readPixels so tile-loading seams often fall outside the frame. */
      var EXPORT_OVERSCAN = 1.12;
      /**
       * After centering the crop, shift it along Y (WebGL bottom-origin) so more of the
       * top of the buffer is discarded — typical forward/travel direction in pitched views.
       */
      var EXPORT_CROP_FORWARD_BIAS = 0.14;

      /** Short monotonic scrub along the route to warm tiles before encode (reduces white flashes). */
      async function exportCameraPreRoll(
        map,
        line,
        pathDistance,
        opts,
        legEndProgress,
        baseAltitudeM,
        legTargetAltitudes,
      ) {
        var steps = 18;
        var s;
        for (s = 1; s <= steps; s++) {
          var phase = (s / steps) * 0.06;
          updateAnimationFrame(
            map,
            line,
            pathDistance,
            phase,
            animationOptsForPathPhase(
              opts,
              phase,
              baseAltitudeM,
              legEndProgress,
              legTargetAltitudes,
            ),
          );
          map.triggerRepaint();
          await new Promise(function (r) {
            requestAnimationFrame(r);
          });
        }
        _previousCameraPosition = null;
        _previousCameraTarget = null;
        updateAnimationFrame(
          map,
          line,
          pathDistance,
          0,
          animationOptsForPathPhase(
            opts,
            0,
            baseAltitudeM,
            legEndProgress,
            legTargetAltitudes,
          ),
        );
        map.triggerRepaint();
        await new Promise(function (r) {
          requestAnimationFrame(r);
        });
      }

          const startAltitudeExport =
            Number(document.getElementById("startAltitude").value) || 400000;
          const pitchExport = TRIPRENDER_DEFAULT_PITCH;
          const lineGradientExport =
            document.getElementById("lineGradient").checked;
          const cameraFollowExport =
            document.getElementById("cameraFollow").checked;
          const bearingChangeExport =
            document.getElementById("bearingChange").checked;

          const warmLine = currentRoute.geometry
            ? turf.lineString(currentRoute.geometry.coordinates.slice())
            : null;
          const warmPathDistance = warmLine
            ? turf.length(warmLine, { units: "kilometers" })
            : 0;
          const rawLegEndWarm = currentRoute?.properties?.legEndProgress;
          const legEndProgressWarm =
            Array.isArray(rawLegEndWarm) && rawLegEndWarm.length > 0
              ? rawLegEndWarm
              : [1];
          const legLengthsWarm = currentRoute?.properties?.legLengths ?? null;
          const legMercatorLengthsKmWarm =
            currentRoute?.properties?.legMercatorLengthsKm ?? null;
          const numLegsWarm = legEndProgressWarm.length;
          const legTargetAltitudesWarm =
            legLengthsWarm?.length === numLegsWarm && numLegsWarm > 0
              ? computeLegTargetAltitudes(
                  startAltitudeExport,
                  legLengthsWarm,
                  legMercatorLengthsKmWarm,
                )
              : null;
          const warmOpts = {
            startBearing: startBearingExport,
            startAltitude: startAltitudeExport,
            pitch: pitchExport,
            lineGradient: lineGradientExport,
            cameraFollow: cameraFollowExport,
            bearingChange: bearingChangeExport,
          };
          _previousCameraPosition = null;
          _previousCameraTarget = null;
          updateAnimationFrame(
            map,
            warmLine,
            warmPathDistance,
            0,
            animationOptsForPathPhase(
              warmOpts,
              0,
              startAltitudeExport,
              legEndProgressWarm,
              legTargetAltitudesWarm,
            ),
          );
          map.triggerRepaint();
          await exportCameraPreRoll(
            map,
            warmLine,
            warmPathDistance,
            warmOpts,
            legEndProgressWarm,
            startAltitudeExport,
            legTargetAltitudesWarm,
          );
          await settleMapWithRepaint(map, 14);

          if (exportWakeRaf) {
            cancelAnimationFrame(exportWakeRaf);
            exportWakeRaf = 0;
          }

          const gl = map.painter.context.gl;
          let glFullW = gl.drawingBufferWidth;
          let glFullH = gl.drawingBufferHeight;
          if (glFullW >= 2 && glFullW & 1) glFullW--;
          if (glFullH >= 2 && glFullH & 1) glFullH--;

          if (!glFullW || !glFullH) {
            throw new Error(
              "Map canvas has zero size after resize; cannot export video.",
            );
          }

          var targetW = width;
          var targetH = height;
          if (targetW >= 2 && targetW & 1) targetW--;
          if (targetH >= 2 && targetH & 1) targetH--;
          targetW = Math.min(targetW, glFullW);
          targetH = Math.min(targetH, glFullH);
          if (targetW < 2 || targetH < 2) {
            throw new Error(
              "Export size is too large for the current GL buffer; pick a smaller export size.",
            );
          }

          var excessX = glFullW - targetW;
          var excessY = glFullH - targetH;
          var cropX = Math.max(0, Math.floor(excessX * 0.5));
          var cropY = Math.max(
            0,
            Math.floor(excessY * (0.5 - EXPORT_CROP_FORWARD_BIAS)),
          );
          if (cropY + targetH > glFullH) {
            cropY = Math.max(0, glFullH - targetH);
          }

          gl.pixelStorei(gl.PACK_ALIGNMENT, 1);

          const encoder = Encoder.create({
            width: targetW,
            height: targetH,
            fps: 60,
            rgbFlipY: true,
            sequential: true,
          });
          // sequential: true = moov atom before mdat (Apple/Safari requirement for playback and Save to Photos)

          const rgbByteLen = targetW * targetH * 4;

          /** JS-heap buffer: readPixels into WASM HEAPU8 can yield empty video on WebKit/Tauri. */
          var exportRgbScratch = null;
          const captureFrame = () => {
            if (!exportRgbScratch || exportRgbScratch.length !== rgbByteLen) {
              exportRgbScratch = new Uint8Array(rgbByteLen);
            }
            if (gl.READ_FRAMEBUFFER !== undefined) {
              gl.bindFramebuffer(gl.READ_FRAMEBUFFER, null);
            } else {
              gl.bindFramebuffer(gl.FRAMEBUFFER, null);
            }
            gl.readPixels(
              cropX,
              cropY,
              targetW,
              targetH,
              gl.RGBA,
              gl.UNSIGNED_BYTE,
              exportRgbScratch,
            );
            encoder.encodeRGB(exportRgbScratch);
          };

          setExportStatus("Exporting...");

          const rawLegEndExport = currentRoute?.properties?.legEndProgress;
          const legEndProgressExport =
            Array.isArray(rawLegEndExport) && rawLegEndExport.length > 0
              ? rawLegEndExport
              : [1];
          const manualDurationsExport = getManualLegDurationsForAnimation(
            legEndProgressExport.length,
          );
          await animatePath({
            map,
            path: currentRoute,
            maxTimePerStep: maxTimePerStepExport,
            speedup: speedupExport,
            manualLegDurations: manualDurationsExport ?? undefined,
            startBearing: startBearingExport,
            startAltitude: startAltitudeExport,
            pitch: pitchExport,
            lineGradient: lineGradientExport,
            cameraFollow: cameraFollowExport,
            bearingChange: bearingChangeExport,
            exportMode: true,
            onProgress: (p) => {
              setExportStatus("Exporting... " + Math.round(p * 100) + "%");
            },
            onRender: captureFrame,
          });
          const mp4 = encoder.end();
          exportResult.bytes = mp4.byteLength;
          const downloadBlob = new Blob([mp4], { type: "video/mp4" });

          if (
            typeof window.triprenderIsTauri === "function" &&
            window.triprenderIsTauri() &&
            typeof window.saveTripRenderExport === "function"
          ) {
            try {
              const result = await window.saveTripRenderExport(mp4);
              exportResult.resultKind = result.kind;
              exportResult.path = result.path || null;
              if (result.kind === "ios-photos-library") {
                setExportStatus("Saved to Photos (Library / Recents).");
              } else if (result.kind === "android-save") {
                setExportStatus("Video saved.");
              } else if (result.kind === "cancelled") {
                setExportStatus("Save cancelled.");
              } else {
                const blobUrl = URL.createObjectURL(downloadBlob);
                const a = document.createElement("a");
                a.href = blobUrl;
                a.download = "route-animation.mp4";
                a.click();
                setTimeout(function () {
                  URL.revokeObjectURL(blobUrl);
                }, 1000);
                setExportStatus(
                  "Done. Run ffmpeg -i route-animation.mp4 out.mp4 to compress.",
                );
              }
            } catch (tauriErr) {
              exportResult.error =
                (tauriErr && tauriErr.message) || String(tauriErr);
              setExportStatus("Error: " + exportResult.error);
            }
          } else {
            exportResult.resultKind = "web-browser";
            const file = new File([mp4], "route-animation.mp4", {
              type: "video/mp4",
            });
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
            let didShare = false;
            const shareData = { files: [file], title: "Route animation" };
            const canShare =
              typeof navigator.canShare === "function" &&
              navigator.canShare(shareData);
            if (typeof navigator.share === "function" && canShare) {
              try {
                var sharePromise = navigator.share(shareData);
                var timeoutMs = isIOS ? 6000 : 0;
                if (timeoutMs) {
                  try {
                    await Promise.race([
                      sharePromise,
                      new Promise(function (_, reject) {
                        setTimeout(function () {
                          reject({ name: "Timeout" });
                        }, timeoutMs);
                      }),
                    ]);
                  } catch (raceErr) {
                    if (raceErr.name === "Timeout") {
                      didShare = true;
                      setExportStatus(
                        "If you chose Save to Photos or Save to Files, check that app for the video.",
                      );
                    }
                    throw raceErr;
                  }
                } else {
                  await sharePromise;
                }
                if (!didShare) {
                  didShare = true;
                  setExportStatus(
                    isIOS
                      ? "Check the Photos or Files app for the video."
                      : "Saved via share sheet",
                  );
                }
              } catch (shareErr) {
                if (shareErr.name !== "AbortError" && !isIOS) {
                  const blobUrl = URL.createObjectURL(downloadBlob);
                  const a = document.createElement("a");
                  a.href = blobUrl;
                  a.download = "route-animation.mp4";
                  a.click();
                  setTimeout(function () {
                    URL.revokeObjectURL(blobUrl);
                  }, 1000);
                  setExportStatus(
                    "Done. Run ffmpeg -i route-animation.mp4 out.mp4 to compress.",
                  );
                }
              }
            }
            if (!didShare) {
              const blobUrl = URL.createObjectURL(downloadBlob);
              if (isIOS) {
                setExportStatus(
                  'Use "Share again" and choose Save to Photos or Save to Files.',
                );
                const wrap = document.createElement("div");
                wrap.id = "iosSaveOverlay";
                wrap.setAttribute("aria-hidden", "false");
                wrap.style.cssText =
                  "position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;padding:1rem;box-sizing:border-box;";
                const msg = document.createElement("p");
                msg.style.color = "#fff";
                msg.style.textAlign = "center";
                msg.style.margin = "0";
                msg.style.maxWidth = "320px";
                if (typeof navigator.share === "function") {
                  msg.textContent =
                    'To save to Photos: tap "Share again" and choose Save to Photos or Save to Files. You can also long-press the video below and choose Save to Video / Add to Photos.';
                } else {
                  msg.textContent =
                    "Saving to Photos only works in Safari. Open this page in Safari (and use HTTPS), then export again and use the share sheet.";
                }
                const videoEl = document.createElement("video");
                videoEl.controls = true;
                videoEl.setAttribute("playsinline", "");
                videoEl.style.maxWidth = "100%";
                videoEl.style.maxHeight = "40vh";
                videoEl.style.borderRadius = "8px";
                const sourceEl = document.createElement("source");
                sourceEl.src = blobUrl;
                sourceEl.type = "video/mp4";
                videoEl.appendChild(sourceEl);
                const shareAgainBtn = document.createElement("button");
                shareAgainBtn.type = "button";
                shareAgainBtn.textContent = "Share again";
                shareAgainBtn.style.padding = "0.75rem 1.5rem";
                shareAgainBtn.style.fontSize = "1.1rem";
                shareAgainBtn.onclick = function () {
                  const shareFile = new File(
                    [downloadBlob],
                    "route-animation.mp4",
                    {
                      type: "video/mp4",
                    },
                  );
                  var resolved = false;
                  function closeOverlay(successMsg) {
                    if (resolved) return;
                    resolved = true;
                    wrap.remove();
                    URL.revokeObjectURL(blobUrl);
                    if (successMsg) setExportStatus(successMsg);
                  }
                  var t = setTimeout(function () {
                    closeOverlay(
                      "If you chose Save to Photos or Save to Files, check that app for the video.",
                    );
                  }, 3000);
                  navigator
                    .share({ files: [shareFile], title: "Route animation" })
                    .then(
                      function () {
                        clearTimeout(t);
                        closeOverlay(
                          "Check the Photos or Files app for the video.",
                        );
                      },
                      function (err) {
                        clearTimeout(t);
                        if (err.name !== "AbortError") {
                          setExportStatus(
                            "Share failed: " + (err.message || err.name),
                          );
                        }
                        closeOverlay();
                      },
                    );
                };
                const closeBtn = document.createElement("button");
                closeBtn.type = "button";
                closeBtn.textContent = "Close";
                closeBtn.style.padding = "0.5rem 1rem";
                closeBtn.onclick = function () {
                  wrap.remove();
                  URL.revokeObjectURL(blobUrl);
                  setExportStatus("");
                };
                wrap.appendChild(msg);
                wrap.appendChild(videoEl);
                if (typeof navigator.share === "function") {
                  wrap.appendChild(shareAgainBtn);
                }
                wrap.appendChild(closeBtn);
                document.body.appendChild(wrap);
              } else {
                const a = document.createElement("a");
                a.href = blobUrl;
                a.download = "route-animation.mp4";
                a.click();
                setTimeout(function () {
                  URL.revokeObjectURL(blobUrl);
                }, 1000);
                setExportStatus(
                  "Done. Run ffmpeg -i route-animation.mp4 out.mp4 to compress.",
                );
              }
            }
          }
        } catch (err) {
          exportResult.error = (err && err.message) || String(err);
          setExportStatus("Error: " + exportResult.error);
        } finally {
          if (exportWakeRaf) {
            cancelAnimationFrame(exportWakeRaf);
            exportWakeRaf = 0;
          }
          mapEl.style.width = savedWidth;
          mapEl.style.height = savedHeight;
          mapEl.style.transform = "";
          mapEl.style.transformOrigin = "";
          map.resize();
          try {
            await settleMapWithRepaint(map, 18);
          } catch (_) {}
          document.body.classList.remove("exporting");
          if (exportOverlay) exportOverlay.classList.remove("visible");
          const overlayStatusEl = document.getElementById(
            "exportOverlayStatus",
          );
          if (overlayStatusEl) overlayStatusEl.textContent = "";
          exportBtn.disabled = false;
          exportInProgress = false;
          updateAnimationUI();
          setPanelOpen(true);
          await triprenderShowExportResult(exportResult);
        }
      }
    </script>
  </body>
</html>
